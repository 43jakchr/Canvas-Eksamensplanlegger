<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eksamensplanlegger</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --akademiet-orange: #ed7b01;
      --akademiet-yellow: #fecf05;
      --akademiet-blue: #212c60;
      --akademiet-green: #347d76;
      --akademiet-red: #77240e;
      --akademiet-gray: #b0aeb7;
      --akademiet-black: #000000;
      --akademiet-white: #ffffff;

      --warning-orange-bg: #fff3e6;
      --warning-orange-border: var(--akademiet-orange);
      --warning-red-bg: #fbe9e5;
      --warning-red-border: var(--akademiet-red);

      --text: #222;
      --muted-text: #555;
      --border: #e1e1e1;
      --light-bg: #f7f7f7;
      --green-bg: #e6f1f0;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      background: var(--white);
      color: var(--text);
      font-family: "Roboto", Arial, sans-serif;
      line-height: 1.5;
    }

    input[type="checkbox"] {
      accent-color: var(--akademiet-green);
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
    }

    .top-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .header-text {
      flex: 1;
    }

    .logo {
      width: 110px;
      height: auto;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    h1,
    h2,
    h3 {
      font-family: "Oswald", Arial, sans-serif;
      line-height: 1.2;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      letter-spacing: 0.5px;
      color: var(--akademiet-orange);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      color: var(--text);
    }

    h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      color: var(--text);
    }

    p {
      margin: 0 0 12px;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 18px;
    }

    .section {
      background: var(--light-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title-row h2 {
      margin: 0;
      flex: 1 1 auto;
    }

    .inline-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
      margin-left: auto;
    }

    .semester-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .semester-option {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }

    .semester-option:hover {
      border-color: var(--akademiet-green);
    }

    .semester-option input {
      margin: 0;
    }

    .search {
      width: 100%;
      padding: 11px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 12px;
      font-family: "Roboto", Arial, sans-serif;
    }

    .search:focus {
      outline: 2px solid rgba(52, 125, 118, 0.25);
      border-color: var(--akademiet-green);
    }

    .status {
      margin-bottom: 12px;
      color: var(--muted-text);
    }

    .subject-list {
      margin-top: 12px;
    }

    .semester-columns,
    .selected-semester-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .semester-column {
      background: #ffffff;
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      overflow: hidden;
    }

    .semester-column-header {
      background: var(--green-bg);
      border-bottom: 3px solid var(--akademiet-green);
      padding: 10px 12px;
    }

    .semester-column-header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .semester-column-count {
      display: block;
      margin-top: 3px;
      font-size: 0.82rem;
      color: var(--muted-text);
      font-family: "Roboto", Arial, sans-serif;
      font-weight: 400;
    }

    .semester-subjects,
    .selected-subject-list {
      display: grid;
      gap: 9px;
      padding: 10px;
    }

    .subject-card {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      background: var(--white);
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 11px;
      cursor: pointer;
      min-height: 88px;
    }

    .subject-card:hover {
      border-color: var(--akademiet-green);
    }

    .subject-card.duplicate-warning,
    .selected-subject-card.duplicate-warning {
      background: var(--warning-orange-bg);
      border-color: var(--warning-orange-border);
      border-left: 5px solid var(--warning-orange-border);
    }

    .subject-card.date-warning,
    .selected-subject-card.date-warning {
      background: var(--warning-red-bg);
      border-color: var(--warning-red-border);
      border-left: 5px solid var(--warning-red-border);
    }

    .subject-card.combined-warning,
    .selected-subject-card.combined-warning {
      background: linear-gradient(90deg, var(--warning-red-bg), var(--warning-orange-bg));
      border-color: var(--warning-red-border);
      border-left: 5px solid var(--warning-red-border);
    }

    .subject-card input {
      margin-top: 4px;
      flex: 0 0 auto;
    }

    .subject-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
      line-height: 1.3;
    }

    .subject-meta {
      font-size: 0.84rem;
      color: #444;
      line-height: 1.36;
    }

    button {
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.98rem;
      font-family: "Roboto", Arial, sans-serif;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .button-generate {
      background: var(--akademiet-orange);
    }

    .button-copy {
      background: var(--akademiet-blue);
    }

    .button-reset {
      background: var(--akademiet-green);
    }

    .small-button {
      padding: 6px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .plan-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 12px;
    }

    .copy-status {
      margin-top: 10px;
      color: var(--akademiet-green);
      font-weight: 500;
      min-height: 1.4em;
    }

    .warning-box {
      display: none;
      background: #ffffff;
      border: 1px solid #d8d8d8;
      border-left: 6px solid var(--akademiet-red);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 12px 0 14px;
      color: #222;
      font-size: 0.94rem;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .warning-box-title {
      display: block;
      margin-bottom: 8px;
      font-family: "Oswald", Arial, sans-serif;
      font-size: 1.05rem;
      color: var(--akademiet-red);
    }

    .warning-box ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .warning-box li {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .warning-box li + li {
      margin-top: 8px;
    }

    .warning-label {
      display: inline-block;
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      margin-top: 1px;
      font-size: 0.74rem;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .warning-label.same-subject-label {
      background: var(--akademiet-orange);
    }

    .warning-label.date-label {
      background: var(--akademiet-red);
    }

    .warning-message {
      flex: 1 1 auto;
    }

    .warning-message strong {
      color: var(--akademiet-red);
    }

    .plan-output {
      display: none;
      background: var(--white);
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-top: 14px;
    }

    .plan-output h2 {
      margin-bottom: 18px;
    }

    .selected-subject-card {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 11px;
    }

    .remove-subject-button {
      background: transparent;
      color: var(--akademiet-red);
      width: auto;
      height: auto;
      padding: 0 4px;
      font-size: 1.25rem;
      line-height: 1;
      border-radius: 0;
      flex: 0 0 auto;
      font-weight: 700;
    }

    .remove-subject-button:hover {
      background: transparent;
      color: var(--akademiet-black);
      opacity: 1;
    }

    .empty {
      color: #777;
      font-style: italic;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .top-header {
        gap: 12px;
      }

      .logo {
        width: 82px;
      }

      h1 {
        font-size: 1.55rem;
      }

      .section {
        padding: 14px;
      }

      .section-title-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .inline-actions {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
        flex-wrap: wrap;
      }

      .plan-actions {
        justify-content: flex-start;
      }

      .small-button {
        width: auto;
      }

      .semester-grid {
        flex-direction: column;
      }

      .semester-option {
        width: 100%;
      }

      .semester-columns,
      .selected-semester-columns {
        grid-template-columns: 1fr;
      }

      .selected-subject-card {
        flex-direction: row;
      }

      .remove-subject-button {
        align-self: flex-start;
      }

      .warning-box li {
        flex-direction: column;
        gap: 4px;
      }
    }

    @media print {
      body {
        padding: 0;
      }

      .top-header,
      hr,
      .section:not(.print-section),
      .inline-actions,
      .plan-actions,
      .search,
      #valgtTeller,
      #kopiStatus,
      #obsVarsel,
      #obsVarselTopp,
      .remove-subject-button {
        display: none !important;
      }

      .app {
        max-width: none;
      }

      .print-section {
        border: none;
        background: white;
        padding: 0;
      }

      .print-section > h2 {
        display: none;
      }

      .plan-output {
        display: block !important;
        border: none;
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="top-header">
      <div class="header-text">
        <h1>EKSAMENSPLANLEGGER</h1>

        <p>
          Velg ett eller flere semestre, søk etter fag, huk av fagene du ønsker å ta,
          og generer en ryddig eksamensliste.
        </p>
      </div>

      <img
        class="logo"
        src="akademiet_oransje_rgb.png"
        alt="Akademiet-logo"
      >
    </div>

    <hr>

    <section class="section">
      <h2>1. Velg semester</h2>
      <div id="semesterValg" class="semester-grid"></div>
    </section>

    <section class="section">
      <div class="section-title-row">
        <h2>2. Velg fag</h2>

        <div class="inline-actions">
          <button id="genererKnapp" class="small-button button-generate" type="button">Generer</button>
          <button id="nullstillKnapp" class="small-button button-reset" type="button">Tilbakestill</button>
        </div>
      </div>

      <input
        id="sok"
        class="search"
        type="text"
        placeholder="Begynn å skrive fag, fagkode eller dato..."
      >

      <div id="status" class="status">Velg semester og begynn å skrive for å vise fag.</div>

      <div id="obsVarselTopp" class="warning-box" aria-live="polite"></div>

      <div id="fagliste" class="subject-list"></div>
    </section>

    <section id="eksamensliste" class="section print-section">
      <h2>3. Din eksamensliste</h2>

      <p id="valgtTeller">Ingen fag valgt.</p>

      <div class="plan-actions">
        <button id="genererKnappNede" class="small-button button-generate" type="button">Generer</button>
        <button id="kopierKnappNede" class="small-button button-copy" type="button">Kopier</button>
        <button id="nullstillKnappNede" class="small-button button-reset" type="button">Tilbakestill</button>
      </div>

      <div id="obsVarsel" class="warning-box" aria-live="polite"></div>

      <p id="kopiStatus" class="copy-status" aria-live="polite"></p>

      <div id="planOutput" class="plan-output"></div>
    </section>
  </main>

  <script>
    const semesterFiler = [
      {
        id: "V2026",
        navn: "Vår 2026",
        url: "data/FagkoderV2026.csv"
      },
      {
        id: "H2026",
        navn: "Høst 2026",
        url: "data/FagkoderH2026.csv"
      },
      {
        id: "V2027",
        navn: "Vår 2027",
        url: "data/FagkoderV2027.csv"
      },
      {
        id: "H2027",
        navn: "Høst 2027",
        url: "data/FagkoderH2027.csv"
      }
    ];

    let alleFag = [];
    let valgteSemester = new Set();
    let valgteFag = new Map();

    const semesterValg = document.getElementById("semesterValg");
    const fagliste = document.getElementById("fagliste");
    const statusfelt = document.getElementById("status");
    const sok = document.getElementById("sok");
    const valgtTeller = document.getElementById("valgtTeller");
    const planOutput = document.getElementById("planOutput");

    function escapeHTML(tekst) {
      return String(tekst || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normaliserTekst(tekst) {
      return String(tekst || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function normaliserDato(dato) {
      return String(dato || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ")
        .replace(/\./g, "");
    }

    function lagId(fag) {
      return [
        fag.semesterId,
        fag.fag,
        fag.muntlig,
        fag.skriftlig1,
        fag.dato1,
        fag.skriftlig2,
        fag.dato2
      ].join("-");
    }

    function parseCSV(csvText, semester) {
      const lines = csvText.trim().split(/\r?\n/);
      const headers = lines[0].split(";").map(header => header.trim());

      return lines
        .slice(1)
        .filter(line => line.trim() !== "")
        .map(line => {
          const values = line.split(";").map(value => value.trim());
          const obj = {};

          headers.forEach((header, index) => {
            obj[header] = values[index] || "";
          });

          obj.semesterId = semester.id;
          obj.semesterNavn = semester.navn;
          obj.id = lagId(obj);
          obj._duplikatVarsel = false;
          obj._datoVarsel = false;

          return obj;
        });
    }

    function byggSemesterValg() {
      semesterValg.innerHTML = semesterFiler
        .map(semester => {
          return `
            <label class="semester-option">
              <input type="checkbox" value="${escapeHTML(semester.id)}">
              ${escapeHTML(semester.navn)}
            </label>
          `;
        })
        .join("");

      semesterValg.querySelectorAll("input").forEach(input => {
        input.addEventListener("change", () => {
          if (input.checked) {
            valgteSemester.add(input.value);
          } else {
            valgteSemester.delete(input.value);
          }

          visFagliste();
        });
      });
    }

    async function hentAlleFag() {
      statusfelt.textContent = "Laster inn fag...";

      const alleSemesterData = await Promise.all(
        semesterFiler.map(async semester => {
          const response = await fetch(semester.url);

          if (!response.ok) {
            throw new Error(`Kunne ikke laste ${semester.url}`);
          }

          const csvText = await response.text();
          return parseCSV(csvText, semester);
        })
      );

      alleFag = alleSemesterData.flat();
      statusfelt.textContent = "Velg semester og begynn å skrive for å vise fag.";
    }

    function fagMatcherSok(fag, soketekst) {
      const samletTekst = [
        fag.fag,
        fag.muntlig,
        fag.skriftlig1,
        fag.dato1,
        fag.skriftlig2,
        fag.dato2,
        fag.semesterNavn
      ]
        .join(" ")
        .toLowerCase();

      return samletTekst.includes(soketekst);
    }

    function grupperFagEtterSemester(fagArray) {
      return fagArray.reduce((grupper, fag) => {
        if (!grupper[fag.semesterId]) {
          grupper[fag.semesterId] = {
            semesterNavn: fag.semesterNavn,
            fag: []
          };
        }

        grupper[fag.semesterId].fag.push(fag);
        return grupper;
      }, {});
    }

    function hentVarselKlasse(fag) {
      const harDuplikat = fag._duplikatVarsel === true;
      const harDatoKollisjon = fag._datoVarsel === true;

      if (harDuplikat && harDatoKollisjon) {
        return "combined-warning";
      }

      if (harDatoKollisjon) {
        return "date-warning";
      }

      if (harDuplikat) {
        return "duplicate-warning";
      }

      return "";
    }

    function lagFagkortHTML(fag) {
      const checked = valgteFag.has(fag.id) ? "checked" : "";
      const varselKlasse = hentVarselKlasse(fag);

      return `
        <label class="subject-card ${varselKlasse}">
          <input type="checkbox" value="${escapeHTML(fag.id)}" ${checked}>
          <div>
            <div class="subject-title">${escapeHTML(fag.fag)}</div>
            <div class="subject-meta">
              ${fag.muntlig ? `<strong>Muntlig:</strong> ${escapeHTML(fag.muntlig)}<br>` : ""}
              ${
                fag.skriftlig1
                  ? `<strong>Skriftlig:</strong> ${escapeHTML(fag.skriftlig1)}${fag.dato1 ? ` – ${escapeHTML(fag.dato1)}` : ""}<br>`
                  : ""
              }
              ${
                fag.skriftlig2
                  ? `<strong>Skriftlig:</strong> ${escapeHTML(fag.skriftlig2)}${fag.dato2 ? ` – ${escapeHTML(fag.dato2)}` : ""}`
                  : ""
              }
            </div>
          </div>
        </label>
      `;
    }

    function visFagliste() {
      const soketekst = sok.value.trim().toLowerCase();

      if (valgteSemester.size === 0) {
        fagliste.innerHTML = "";
        statusfelt.textContent = "Velg minst ett semester først.";
        return;
      }

      if (soketekst.length === 0) {
        fagliste.innerHTML = "";
        statusfelt.textContent = "Begynn å skrive for å vise fag.";
        return;
      }

      const filtrerteFag = alleFag.filter(fag => {
        const semesterErValgt = valgteSemester.has(fag.semesterId);
        const matcherSok = fagMatcherSok(fag, soketekst);

        return semesterErValgt && matcherSok;
      });

      if (filtrerteFag.length === 0) {
        fagliste.innerHTML = "";
        statusfelt.textContent = "Ingen fag funnet.";
        return;
      }

      const gruppert = grupperFagEtterSemester(filtrerteFag);
      const semesterRekkefolge = semesterFiler
        .map(semester => semester.id)
        .filter(id => gruppert[id]);

      statusfelt.textContent = `${filtrerteFag.length} fag funnet.`;

      fagliste.innerHTML = `
        <div class="semester-columns">
          ${semesterRekkefolge.map(semesterId => {
            const gruppe = gruppert[semesterId];

            return `
              <div class="semester-column">
                <div class="semester-column-header">
                  <h3>
                    ${escapeHTML(gruppe.semesterNavn)}
                    <span class="semester-column-count">${gruppe.fag.length} treff</span>
                  </h3>
                </div>

                <div class="semester-subjects">
                  ${gruppe.fag.map(lagFagkortHTML).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      fagliste.querySelectorAll("input").forEach(input => {
        input.addEventListener("change", () => {
          const fag = alleFag.find(item => item.id === input.value);

          if (input.checked && fag) {
            valgteFag.set(fag.id, fag);
          } else {
            valgteFag.delete(input.value);
          }

          oppdaterValgtTeller();
          oppdaterObsVarsel();
          visFagliste();
        });
      });
    }

    function oppdaterValgtTeller() {
      const antall = valgteFag.size;

      valgtTeller.textContent =
        antall === 0
          ? "Ingen fag valgt."
          : `${antall} fag valgt.`;
    }

    function hentEksamenDatoer(fag) {
      const datoer = [];

      if (fag.dato1) {
        datoer.push({
          fagId: fag.id,
          dato: fag.dato1,
          normalisertDato: normaliserDato(fag.dato1),
          fag: fag.fag,
          kode: fag.skriftlig1 || "",
          semester: fag.semesterNavn
        });
      }

      if (fag.dato2) {
        datoer.push({
          fagId: fag.id,
          dato: fag.dato2,
          normalisertDato: normaliserDato(fag.dato2),
          fag: fag.fag,
          kode: fag.skriftlig2 || "",
          semester: fag.semesterNavn
        });
      }

      return datoer;
    }

    function nullstillFagVarsler() {
      alleFag.forEach(fag => {
        fag._duplikatVarsel = false;
        fag._datoVarsel = false;
      });
    }

    function oppdaterObsVarsel() {
      const obsVarsel = document.getElementById("obsVarsel");
      const obsVarselTopp = document.getElementById("obsVarselTopp");
      const valgte = Array.from(valgteFag.values());
      const varsler = [];

      nullstillFagVarsler();

      const fagGrupper = valgte.reduce((grupper, fag) => {
        const fagNavn = normaliserTekst(fag.fag);

        if (!grupper[fagNavn]) {
          grupper[fagNavn] = [];
        }

        grupper[fagNavn].push(fag);
        return grupper;
      }, {});

      Object.values(fagGrupper).forEach(gruppe => {
        const semester = [...new Set(gruppe.map(fag => fag.semesterNavn))];

        if (semester.length > 1) {
          gruppe.forEach(fag => {
            fag._duplikatVarsel = true;
          });

          varsler.push({
            type: "same",
            label: "SAMME FAG",
            message: `Samme fag er valgt i flere semestre: <strong>${escapeHTML(gruppe[0].fag)}</strong> (${semester.map(escapeHTML).join(", ")}).`
          });
        }
      });

      const alleDatoer = valgte.flatMap(hentEksamenDatoer);

      const datoGrupper = alleDatoer.reduce((grupper, eksamen) => {
        if (!eksamen.normalisertDato) {
          return grupper;
        }

        if (!grupper[eksamen.normalisertDato]) {
          grupper[eksamen.normalisertDato] = [];
        }

        grupper[eksamen.normalisertDato].push(eksamen);
        return grupper;
      }, {});

      Object.values(datoGrupper).forEach(gruppe => {
        const unikeFag = [...new Set(gruppe.map(eksamen => normaliserTekst(eksamen.fag)))];

        if (gruppe.length > 1 && unikeFag.length > 1) {
          gruppe.forEach(eksamen => {
            const valgtFag = valgte.find(fag => fag.id === eksamen.fagId);

            if (valgtFag) {
              valgtFag._datoVarsel = true;
            }
          });

          const fagListe = gruppe
            .map(eksamen => {
              const kode = eksamen.kode ? ` (${escapeHTML(eksamen.kode)})` : "";
              return `${escapeHTML(eksamen.fag)}${kode} – ${escapeHTML(eksamen.semester)}`;
            })
            .join(", ");

          varsler.push({
            type: "date",
            label: "DATO",
            message: `Mulig datokollisjon: <strong>${escapeHTML(gruppe[0].dato)}</strong> gjelder ${fagListe}.`
          });
        }
      });

      if (varsler.length === 0) {
        [obsVarsel, obsVarselTopp].forEach(boks => {
          if (!boks) return;
          boks.style.display = "none";
          boks.innerHTML = "";
        });

        return;
      }

      const varselHTML = `
        <span class="warning-box-title">OBS OBS</span>
        <ul>
          ${varsler.map(varsel => {
            const labelClass = varsel.type === "date"
              ? "date-label"
              : "same-subject-label";

            return `
              <li>
                <span class="warning-label ${labelClass}">${varsel.label}</span>
                <span class="warning-message">${varsel.message}</span>
              </li>
            `;
          }).join("")}
        </ul>
      `;

      [obsVarsel, obsVarselTopp].forEach(boks => {
        if (!boks) return;
        boks.style.display = "block";
        boks.innerHTML = varselHTML;
      });
    }

    function grupperValgteFag() {
      const fag = Array.from(valgteFag.values());

      return fag.reduce((grupper, item) => {
        if (!grupper[item.semesterId]) {
          grupper[item.semesterId] = {
            semesterNavn: item.semesterNavn,
            fag: []
          };
        }

        grupper[item.semesterId].fag.push(item);
        return grupper;
      }, {});
    }

    function genererPlanHTML() {
      oppdaterObsVarsel();

      if (valgteFag.size === 0) {
        planOutput.style.display = "block";
        planOutput.innerHTML = `<p class="empty">Du har ikke valgt noen fag ennå.</p>`;

        document.getElementById("eksamensliste").scrollIntoView({
          behavior: "smooth",
          block: "start"
        });

        return;
      }

      const gruppert = grupperValgteFag();

      let html = `
        <h2>Min eksamensplan</h2>
        <div class="selected-semester-columns">
      `;

      semesterFiler
        .filter(semester => gruppert[semester.id])
        .forEach(semester => {
          const gruppe = gruppert[semester.id];

          html += `
            <div class="semester-column">
              <div class="semester-column-header">
                <h3>
                  ${escapeHTML(gruppe.semesterNavn)}
                  <span class="semester-column-count">${gruppe.fag.length} valgt</span>
                </h3>
              </div>

              <div class="selected-subject-list">
          `;

          gruppe.fag.forEach(fag => {
            const varselKlasse = hentVarselKlasse(fag);

            html += `
              <div class="selected-subject-card ${varselKlasse}">
                <div>
                  <strong>${escapeHTML(fag.fag)}</strong><br>
                  ${fag.muntlig ? `Muntlig: ${escapeHTML(fag.muntlig)}<br>` : ""}
                  ${
                    fag.skriftlig1
                      ? `Skriftlig: ${escapeHTML(fag.skriftlig1)}${fag.dato1 ? ` – ${escapeHTML(fag.dato1)}` : ""}<br>`
                      : ""
                  }
                  ${
                    fag.skriftlig2
                      ? `Skriftlig: ${escapeHTML(fag.skriftlig2)}${fag.dato2 ? ` – ${escapeHTML(fag.dato2)}` : ""}`
                      : ""
                  }
                </div>

                <button
                  class="remove-subject-button"
                  type="button"
                  aria-label="Fjern ${escapeHTML(fag.fag)}"
                  title="Fjern"
                  data-remove-id="${escapeHTML(fag.id)}">
                  ×
                </button>
              </div>
            `;
          });

          html += `
              </div>
            </div>
          `;
        });

      html += `</div>`;

      planOutput.style.display = "block";
      planOutput.innerHTML = html;

      planOutput.querySelectorAll("[data-remove-id]").forEach(button => {
        button.addEventListener("click", () => {
          fjernValgtFag(button.getAttribute("data-remove-id"));
        });
      });

      document.getElementById("eksamensliste").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function fjernValgtFag(fagId) {
      valgteFag.delete(fagId);

      oppdaterValgtTeller();
      oppdaterObsVarsel();
      visFagliste();
      genererPlanHTML();
    }

    function genererPlanTekst() {
      if (valgteFag.size === 0) {
        return "Ingen fag valgt.";
      }

      const gruppert = grupperValgteFag();
      let tekst = "Min eksamensplan\n\n";

      semesterFiler
        .filter(semester => gruppert[semester.id])
        .forEach(semester => {
          const gruppe = gruppert[semester.id];

          tekst += `${gruppe.semesterNavn}\n`;

          gruppe.fag.forEach(fag => {
            tekst += `\n${fag.fag}\n`;

            if (fag.muntlig) {
              tekst += `Muntlig: ${fag.muntlig}\n`;
            }

            if (fag.skriftlig1) {
              tekst += `Skriftlig: ${fag.skriftlig1}${fag.dato1 ? ` – ${fag.dato1}` : ""}\n`;
            }

            if (fag.skriftlig2) {
              tekst += `Skriftlig: ${fag.skriftlig2}${fag.dato2 ? ` – ${fag.dato2}` : ""}\n`;
            }
          });

          tekst += "\n";
        });

      return tekst;
    }

    function kopierTekstFallback(tekst) {
      const textarea = document.createElement("textarea");
      textarea.value = tekst;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      textarea.style.left = "-9999px";

      document.body.appendChild(textarea);
      textarea.select();

      let vellykket = false;

      try {
        vellykket = document.execCommand("copy");
      } catch (error) {
        vellykket = false;
      }

      document.body.removeChild(textarea);
      return vellykket;
    }

    async function kopierListe() {
      const tekst = genererPlanTekst();
      const kopiStatus = document.getElementById("kopiStatus");

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(tekst);
          kopiStatus.textContent = "Listen er kopiert.";
        } else {
          const kopiert = kopierTekstFallback(tekst);

          kopiStatus.textContent = kopiert
            ? "Listen er kopiert."
            : "Kunne ikke kopiere automatisk.";
        }
      } catch (error) {
        const kopiert = kopierTekstFallback(tekst);

        kopiStatus.textContent = kopiert
          ? "Listen er kopiert."
          : "Kunne ikke kopiere automatisk.";

        console.error(error);
      }

      setTimeout(() => {
        kopiStatus.textContent = "";
      }, 2500);
    }

    function nullstillValg() {
      valgteFag.clear();
      planOutput.style.display = "none";
      planOutput.innerHTML = "";

      const kopiStatus = document.getElementById("kopiStatus");
      kopiStatus.textContent = "";

      oppdaterValgtTeller();
      oppdaterObsVarsel();
      visFagliste();
    }

    document.getElementById("genererKnapp").addEventListener("click", genererPlanHTML);
    document.getElementById("genererKnappNede").addEventListener("click", genererPlanHTML);

    document.getElementById("nullstillKnapp").addEventListener("click", nullstillValg);
    document.getElementById("nullstillKnappNede").addEventListener("click", nullstillValg);

    document.getElementById("kopierKnappNede").addEventListener("click", kopierListe);

    sok.addEventListener("input", visFagliste);

    byggSemesterValg();

    hentAlleFag().catch(error => {
      statusfelt.textContent = "Kunne ikke laste faglisten. Sjekk at CSV-filene ligger i data-mappen og at filnavnene stemmer.";
      console.error(error);
    });
  </script>
</body>
</html>
